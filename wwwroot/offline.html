<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline · Barber Hub</title>
<style>
    body {
        margin:0;font-family:system-ui,-apple-system,sans-serif;
        background:#faf7f5;color:#1a1d29;
        min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    }
    .card {
        background:#fff;border-radius:20px;padding:40px 32px;max-width:420px;width:100%;
        box-shadow:0 4px 16px rgba(26,29,41,0.08);text-align:center;
    }
    .icon {
        width:64px;height:64px;border-radius:16px;margin:0 auto 20px;
        background:#fce8e8;color:#ef5b5b;display:flex;align-items:center;justify-content:center;
        font-size:1.8rem;
    }
    h1 { margin:0 0 8px; font-size:1.4rem; }
    p { color:#6b7280; margin:0 0 20px; }
    button {
        background:#ef5b5b;color:#fff;border:0;border-radius:10px;
        padding:.6rem 1.2rem;font-weight:600;cursor:pointer;
    }
</style>
</head>
<body>
    <div class="card">
        <div class="icon">⚡</div>
        <h1>You're offline</h1>
        <p>No internet connection right now. Reconnect to continue using Barber Hub.</p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
